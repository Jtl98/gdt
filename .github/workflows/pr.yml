name: pr

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup pnpm
        uses: pnpm/action-setup@v5

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: install
        run: pnpm install

      - name: lint
        run: pnpm lint

      - name: build
        run: pnpm build
